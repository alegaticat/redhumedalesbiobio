<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
            // --- CONFIGURACIÓN ---
            const apiKey = "AIzaSyCUhhxDU1SqBoZMoUmT41boLq6AEMViGUU"; // PEGA TU API KEY AQUÍ
            
            // --- CONTENIDO DEL REPORTE (DENSIDAD MÁXIMA - ~600 PALABRAS POR CAPÍTULO) ---
            const chapters = useMemo(() => [
                {
                    id: 0,
                    title: "Resumen Ejecutivo",
                    narrative: `Resumen Ejecutivo del Cuarto Reporte de Humedales de la Región del Biobío, edición dos mil veintiséis. Este documento constituye un hito en la vigilancia ambiental regional al presentarse en un escenario de crisis socionatural sin precedentes. La génesis de este reporte se halla en el análisis exhaustivo de noventa y seis registros obtenidos a través del catastro ciudadano de la Red de Humedales, recopilados entre diciembre de dos mil veinticinco y enero de dos mil veintiséis. Tras un proceso riguroso de validación técnica y encuestas de terreno, se consolidaron setenta y nueve registros críticos que actúan como una radiografía de la fragilidad de nuestro territorio. Este reporte se dirige no solo a la comunidad académica y científica, sino fundamentalmente a los tomadores de decisiones y a la sociedad civil organizada, buscando integrar perspectivas de ecología profunda, hidrología post-incendio y cartografía social. La tesis central que sostenemos es que la región enfrenta una crisis de convergencia acelerada: la degradación histórica de los humedales urbanos, provocada por una expansión inmobiliaria e industrial desmedida, se ha intersectado fatalmente con la devastación causada por los mega incendios forestales de enero de dos mil veintiséis. Esta situación ha creado un estado de riesgo agravado que amenaza la seguridad hídrica y la biodiversidad de nuestras cuencas costeras. El reporte advierte que los incendios no deben ser vistos como eventos aislados, sino como transformadores radicales de la capacidad de regulación de las cuencas. Frente a este panorama sombrío, la propuesta del Escudo Azul-Verde emerge como una estrategia de resiliencia urgente. Entendemos a los humedales no como elementos decorativos o terrenos eriazos, sino como infraestructura crítica de seguridad pública. El reporte concluye que la inacción institucional ante la pérdida de estos ecosistemas comprometerá la disponibilidad de agua dulce para consumo humano en un período de apenas veinticuatro a treinta y seis meses, por lo que la restauración ecológica y la protección legal deben transformarse en la máxima prioridad de la agenda regional del Biobío.`,
                    data: `Análisis Estadístico del Resumen Ejecutivo. Universo de datos: noventa y seis registros ciudadanos iniciales procesados mediante plataforma digital. Validación: setenta y nueve casos críticos confirmados bajo protocolos de verificación técnica en terreno. Ámbito geográfico: Provincia de Concepción con énfasis en cuencas costeras, Provincia de Arauco y Provincia de Biobío. Hallazgo de criticidad: El cien por ciento de las cuencas analizadas presentan una alteración significativa en sus servicios ecosistémicos de regulación hídrica. Impacto del fuego: Veinte mil quinientas hectáreas afectadas directamente en la zona de interfase y cabeceras de cuenca. Proyección de riesgo: La degradación actual de los humedales receptores se traduce en un riesgo inminente de desabastecimiento hídrico para poblaciones locales en un horizonte inferior a los tres años. Severidad del suelo: Se documenta un sesenta y cinco por ciento de daño extremo en los horizontes orgánicos del suelo, lo que anula la capacidad de infiltración natural de la región.`
                },
                {
                    id: 1,
                    title: "Capítulo 1: Metodología y Ciencia Ciudadana",
                    narrative: `Capítulo Uno. Metodología y Vigilancia Ciudadana en el Territorio. El marco metodológico de este Cuarto Reporte rompe deliberadamente con los paradigmas tradicionales de la vigilancia técnica cerrada y centralizada. En lugar de depender exclusivamente de sensores remotos o informes institucionales que a menudo llegan tarde a la crisis, hemos implementado un modelo de cartografía social y ciencia ciudadana de base. Este proceso se operacionalizó a través de un levantamiento primario de datos digitales entre diciembre de dos mil veinticinco y enero de dos mil veintiséis, permitiendo a los habitantes del Biobío reportar en tiempo real las amenazas que afectan a sus ecosistemas locales. Lo que distingue a esta metodología es su capacidad para capturar percepciones de riesgo e iniciativas de gestión que suelen ser invisibles para las métricas gubernamentales. La validación de los setenta y nueve humedales no fue solo un ejercicio estadístico, sino una reconstrucción colectiva del estado de salud de nuestras cuencas. El reporte revela una verdad política incómoda: el sesenta y ocho punto cuatro por ciento de los humedales reportados están bajo la protección y vigilancia exclusiva de organizaciones socioambientales comunitarias que operan con recursos autogestionados. En contraste, la presencia de la academia institucional y del aparato estatal en la gestión directa de estos sitios es de apenas un seis punto tres por ciento. Esta disparidad demuestra que la verdadera primera línea de defensa ambiental en el Biobío es la ciudadanía organizada. La metodología también incluyó una revisión bibliográfica profunda y el análisis de fuentes públicas del Ministerio del Medio Ambiente, cruzando la información legal con la realidad física del terreno. El resultado es un inventario de ciento cuarenta y dos amenazas específicas categorizadas que permiten identificar patrones de daño sistémico en la región. Este enfoque integral nos permite afirmar que la protección de los humedales no es solo una cuestión de biólogos o ingenieros, sino una lucha política por el control y la supervivencia de los bienes comunes hídricos en el contexto de la crisis climática global.`,
                    data: `Desglose Métrico de la Metodología Ciudadana. Periodo de recolección: sesenta días comprendidos entre diciembre de dos mil veinticinco y enero de dos mil veintiséis. Muestra final: setenta y nueve humedales validados. Identificación de riesgos: ciento cuarenta y dos amenazas específicas documentadas y georreferenciadas. Distribución de la Gobernanza Efectiva: Organizaciones ciudadanas lideran el sesenta y ocho punto cuatro por ciento de los esfuerzos de protección. Instituciones estatales y académicas lideran únicamente el seis punto tres por ciento. Brecha de Financiamiento: El noventa por ciento de las iniciativas de monitoreo y limpieza operan con presupuesto cero de origen público, dependiendo íntegramente de donaciones y trabajo voluntario. Participación comunitaria: se estima que más de mil doscientas personas participaron directa o indirectamente en el levantamiento de información para este reporte regional.`
                },
                {
                    id: 2,
                    title: "Capítulo 2: Los Megaincendios y la Hidrología",
                    narrative: `Capítulo Dos. Los Megaincendios como Eventos Transformadores de Cuenca. Durante enero de dos mil veintiséis, la Región del Biobío experimentó una de las catástrofes forestales más agresivas de la última década. Este capítulo analiza cómo el fuego ha alterado permanentemente el ciclo hidrológico regional. La combustión severa de miles de hectáreas de plantaciones forestales y bosque nativo en las zonas de cabecera no es solo una pérdida de biomasa; es una transformación química del suelo. El calor extremo ha generado lo que denominamos hidrofobicidad post-incendio: una capa repelente al agua que impide que la lluvia se infiltre en la tierra. Esta alteración significa que, ante las primeras tormentas de otoño, el suelo ya no actuará como una esponja, sino como un pavimento impermeable. El resultado es un aumento drástico en la escorrentía superficial, donde el agua corre libremente por las laderas, arrastrando consigo toneladas de cenizas, metales pesados y sedimentos directamente hacia los humedales que se encuentran en las zonas bajas y costeras. Este proceso de colmatación acelerada es una sentencia de muerte para muchos ecosistemas. El humedal, al recibir este flujo de material sólido, pierde su profundidad y su capacidad de almacenamiento, lo que aumenta exponencialmente el riesgo de inundaciones en las zonas urbanas adyacentes. El reporte enfatiza la visión del continuo hidrológico: no se puede proteger un humedal costero si no se gestiona la restauración de los cerros quemados. Los incendios han roto la conectividad natural de la cuenca, y los humedales están actuando como el último filtro de un sistema que está colapsando bajo el peso de la erosión. La urgencia de la restauración ecológica radica en que, sin una cobertura vegetal que frene el agua en la parte alta, las ciudades del Gran Concepción enfrentarán una vulnerabilidad hídrica sin precedentes en la próxima temporada de lluvias, transformando los servicios ecosistémicos de regulación en amenazas de desastre socionatural.`,
                    data: `Indicadores de Impacto Hidrológico Post-Incendio. Superficie total devastada en Provincia de Concepción: veinte mil quinientas hectáreas. Severidad del daño al suelo: sesenta y cinco por ciento de las áreas quemadas presentan daño extremo en la capa orgánica. Alteración del flujo hídrico: se proyecta un incremento del trescientos por ciento en la velocidad y volumen de la escorrentía superficial durante eventos de precipitación intensa. Carga sedimentaria: se estima que los humedales costeros recibirán en una sola temporada de lluvias un volumen de sedimentos equivalente a lo acumulado en diez años de condiciones climáticas normales. Propiedades físicas: aumento crítico de la repelencia al agua en los suelos de granito meteorizado característicos de la cordillera de la costa en el Biobío.`
                },
                {
                    id: 3,
                    title: "Capítulo 3: Radiografía de Amenazas y Casos Críticos",
                    narrative: `Capítulo Tres. Radiografía de Amenazas y Fragilidad Territorial. El estado actual de los humedales en la Región del Biobío es de alerta máxima. La presión sobre estos ecosistemas no es uniforme, pero sí persistente y sistémica. El análisis de los registros ciudadanos revela una concentración crítica de amenazas en el Área Metropolitana de Concepción. La comuna de Coronel lidera el ranking de vulnerabilidad con veintiocho humedales bajo amenaza directa, seguida de cerca por Talcahuano con veinticuatro. Estas cifras no son meras estadísticas; representan ecosistemas vitales que están siendo cercados por la contaminación y la expansión urbana. El reporte identifica que la contaminación por residuos sólidos y vertidos industriales afecta al ochenta y nueve por ciento de los humedales analizados. Sin embargo, la amenaza más estructural sigue siendo la presión inmobiliaria, presente en el ochenta y un por ciento de los casos. Es particularmente alarmante el papel de los rellenos inmobiliarios, que a menudo cuentan con autorizaciones precarias o directamente ilegales. Casos como el humedal Cantarana en la comuna de Los Ángeles ejemplifican esta crisis: proyectos de vialidad y vivienda social, impulsados muchas veces por el propio aparato estatal, se construyen sobre rellenos que destruyen la conectividad hídrica. Es una paradoja trágica que el Estado, llamado a proteger estos bienes comunes mediante la Ley de Humedales Urbanos, sea en ocasiones el principal agente perturbador. El reporte también documenta una brecha de fiscalización inaceptable. A pesar del alto volumen de denuncias ciudadanas por rellenos o vertidos, solo un doce por ciento de estos casos derivan en procesos sancionatorios efectivos. Esta impunidad fomenta un modelo de desarrollo que considera al humedal como un terreno eriazo a la espera de ser pavimentado, ignorando que cada metro cuadrado de humedal perdido es una barrera menos contra las inundaciones y una pérdida irreversible de biodiversidad local. La fragilidad territorial del Biobío está hoy determinada por la colisión entre un modelo extractivista y la necesidad urgente de resiliencia climática.`,
                    data: `Estadísticas de Amenazas y Vulnerabilidad por Comuna. Comunas con mayor incidencia: Coronel (veintiocho registros), Talcahuano (veinticuatro registros), San Pedro de la Paz (doce registros). Categorización de amenazas: Contaminación por residuos y descargas líquidas en el ochenta y nueve por ciento de la muestra. Presión inmobiliaria por rellenos y parcelaciones en el ochenta y un por ciento de los casos. Degradación por incendios forestales en el sesenta por ciento de los sitios. Estado legal: el cuarenta y cinco por ciento de los humedales que ya cuentan con declaratoria oficial bajo la Ley veintiún mil doscientos dos han sufrido intervenciones físicas destructivas durante el último ciclo anual. Eficacia institucional: solo el doce por ciento de las denuncias ciudadanas ingresadas formalmente han resultado en sanciones o medidas de mitigación reales.`
                },
                {
                    id: 4,
                    title: "Capítulo 4: Gobernanza y el Escudo Azul-Verde",
                    narrative: `Capítulo Cuatro. Gobernanza, Resiliencia y la Propuesta del Escudo Azul-Verde. El diagnóstico de este reporte es claro: la normativa actual es insuficiente si no se acompaña de una gestión territorial activa y financiada. Existe una brecha abismante entre la protección legal en el papel y la realidad física del agua. El dato es contundente: el noventa y cuatro por ciento de los humedales urbanos declarados en la Región del Biobío carecen de un plan de manejo operativo que garantice su supervivencia a largo plazo. Ante este vacío de gestión, el reporte propone un cambio de paradigma basado en la creación de un Escudo Azul-Verde. Este concepto busca integrar a los humedales, esteros y cuencas en el corazón de la planificación urbana, no como áreas de conservación aisladas, sino como infraestructura crítica de seguridad pública. La meta estratégica de esta nueva gobernanza es la acreditación del Área Metropolitana de Concepción como Ciudad Humedal bajo la prestigiosa Convención Ramsar. Lograr este sello internacional no es una cuestión cosmética; es una herramienta de presión política y técnica para obligar a la coordinación de las municipalidades, asegurar financiamiento internacional para la restauración post-incendio y establecer estándares de protección que las industrias no puedan ignorar. Proponemos que los humedales sean reconocidos como soluciones basadas en la naturaleza para la adaptación climática. Esto implica destinar fondos regionales específicos para la limpieza, restauración de flora nativa y el monitoreo comunitario permanente. El reporte concluye con un llamado urgente a las autoridades regionales para que dejen de ver la protección ambiental como un obstáculo al desarrollo y comiencen a verla como la única garantía de habitabilidad para las ciudades del Biobío. La construcción del Escudo Azul-Verde es, en última instancia, un acto de justicia territorial y una apuesta por la vida en un planeta que se calienta.`,
                    data: `Indicadores de Gobernanza y Metas Proyectadas. Situación actual: noventa y cuatro por ciento de humedales declarados sin plan de manejo activo. Eficiencia de respuesta: el tiempo promedio entre una denuncia por relleno y la inspección técnica supera los cuarenta días hábiles. Meta de Acreditación Ramsar: Postulación del Área Metropolitana de Concepción al programa de Ciudades Humedal para el periodo dos mil veintisiete. Proyección financiera: la acreditación permitiría el acceso a fondos de cooperación internacional estimados en cinco millones de dólares para restauración ecológica y sistemas de monitoreo en un plazo de cinco años. Propuesta de inversión regional: Creación de un fondo de emergencia para humedales equivalente al dos por ciento del presupuesto regional anual para obras de mitigación post-incendio.`
                },
                {
                    id: 5,
                    title: "Sección Final: Glosario de Términos",
                    narrative: `Sección Final. Glosario de Términos Hidrológicos y Ecológicos del Reporte dos mil veintiséis. Para navegar correctamente por las complejidades de este documento y participar activamente en la defensa del territorio, es imperativo manejar un lenguaje técnico común que describa los procesos que estamos observando. El primer término fundamental es la Hidrofobicidad del suelo. Se refiere a la repelencia química al agua que se genera en los suelos forestales tras incendios de alta intensidad. Este fenómeno impide la infiltración y es el motor principal de las inundaciones repentinas. El segundo concepto es la Colmatación. Este es el proceso de sedimentación acelerada donde el humedal se llena de cenizas y tierra arrastrada por la lluvia, perdiendo su profundidad y convirtiéndose en un pantano seco. Un tercer pilar es el Continuo Hidrológico, que nos enseña que el agua no reconoce límites administrativos; lo que pasa en la punta del cerro afectará inevitablemente a la costa. El cuarto término es la Resiliencia Ecosistémica, que es la capacidad del humedal para absorber el impacto de una tormenta o un vertido y recuperar su función original sin colapsar. Finalmente, el Escudo Azul-Verde es nuestra propuesta para que la red de humedales actúe como una armadura natural de la ciudad contra el cambio climático. Estos conceptos no son solo palabras; son las herramientas de análisis para entender por qué nuestras ciudades se inundan y por qué la protección de cada metro cuadrado de humedal es una batalla por la seguridad de todos. Conocer este glosario permite a las comunidades dialogar de igual a igual con los expertos y exigir medidas basadas en la ciencia y la realidad del territorio.`,
                    data: `Definiciones Técnicas de Referencia. Uno: Hidrofobicidad, repelencia al agua inducida por calor que resulta en un ángulo de contacto gota-suelo superior a los noventa grados. Dos: Colmatación sedimentaria, acumulación de material sólido que reduce el volumen útil de la cubeta del humedal en más de un cincuenta por ciento en eventos extremos. Tres: Escurrimiento Superficial, fracción de la precipitación que se desplaza por la superficie del suelo sin infiltrarse. Cuatro: Humedal Urbano, ecosistema hídrico dentro del radio urbano protegido legalmente por la Ley veintiún mil doscientos dos. Cinco: Resiliencia, parámetro que mide la capacidad de retorno de un ecosistema a su estado estable tras una perturbación crítica. Seis: Escudo Azul-Verde, red integrada de ecosistemas hídricos y corredores biológicos gestionada como infraestructura de resiliencia urbana.`
                }
            ], []);

            // --- ESTADOS ---
            const [currentChapter, setCurrentChapter] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [loading, setLoading] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [progress, setProgress] = useState(0);
            const [playbackSpeed, setPlaybackSpeed] = useState(1);
            const [readingMode, setReadingMode] = useState('narrative');
            const [showChapters, setShowChapters] = useState(false);
            const [error, setError] = useState(null);

            const audioRef = useRef(null);

            // --- LÓGICA DE AUDIO ---
            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
                writeString(0, 'RIFF'); view.setUint32(4, 32 + pcmData.length * 2, true);
                writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                writeString(36, 'data'); view.setUint32(40, pcmData.length * 2, true);
                for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const loadAudio = async (index, mode = readingMode) => {
                if (!apiKey) {
                    setError("Falta API Key de Google AI Studio.");
                    return;
                }
                setLoading(true);
                setError(null);
                setAudioUrl(null);
                setIsPlaying(false);

                const textToRead = mode === 'narrative' ? chapters[index].narrative : chapters[index].data;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: textToRead }] }],
                            generationConfig: { 
                                responseModalities: ["AUDIO"], 
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } 
                            },
                            model: "gemini-2.5-flash-preview-tts"
                        })
                    });

                    const data = await response.json();
                    const b64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    const mime = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.mimeType;
                    const rate = parseInt(mime?.split('rate=')[1]) || 24000;

                    if (b64) {
                        const bin = atob(b64);
                        const pcm = new Int16Array(bin.length / 2);
                        for (let i = 0; i < pcm.length; i++) pcm[i] = (bin.charCodeAt(i * 2 + 1) << 8) | bin.charCodeAt(i * 2);
                        const blob = pcmToWav(pcm, rate);
                        setAudioUrl(URL.createObjectURL(blob));
                        setIsPlaying(true);
                    } else {
                        throw new Error("No se recibió audio del servidor.");
                    }
                } catch (err) {
                    setError("Error al cargar audio: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const togglePlay = () => {
                if (!audioUrl) { loadAudio(currentChapter); }
                else { setIsPlaying(!isPlaying); }
            };

            const changeChapter = (index) => {
                setCurrentChapter(index);
                loadAudio(index);
                setShowChapters(false);
            };

            useEffect(() => {
                if (audioRef.current) {
                    audioRef.current.playbackRate = playbackSpeed;
                    if (isPlaying) audioRef.current.play().catch(() => setIsPlaying(false));
                    else audioRef.current.pause();
                }
            }, [isPlaying, audioUrl, playbackSpeed]);

            return (
                <div className="min-h-screen flex items-center justify-center p-4 sm:p-8">
                    <div className="max-w-md w-full glass-panel rounded-[3rem] shadow-2xl flex flex-col relative overflow-hidden">
                        
                        {/* Header Navigation */}
                        <div className="p-8 flex justify-between items-center relative z-20">
                            <button onClick={() => setShowChapters(!showChapters)} className={`p-3 rounded-2xl transition-all ${showChapters ? 'bg-emerald-500 text-slate-900' : 'bg-slate-800 text-slate-400'}`}>
                                <i data-lucide="list"></i>
                            </button>
                            <div className="text-center">
                                <h1 className="text-[10px] font-bold tracking-[0.3em] text-emerald-500 uppercase">Humedales Biobío</h1>
                                <p className="text-[9px] font-bold text-slate-500 uppercase mt-1">Reporte 2026 • Sección {currentChapter + 1}/6</p>
                            </div>
                            <div className="flex bg-slate-800/80 p-1 rounded-2xl border border-slate-700">
                                <button onClick={() => {setReadingMode('narrative'); loadAudio(currentChapter, 'narrative');}} className={`p-2 rounded-xl transition-all ${readingMode === 'narrative' ? 'bg-slate-900 text-emerald-400' : 'text-slate-500'}`}>
                                    <i data-lucide="message-square-text" className="w-4 h-4"></i>
                                </button>
                                <button onClick={() => {setReadingMode('data'); loadAudio(currentChapter, 'data');}} className={`p-2 rounded-xl transition-all ${readingMode === 'data' ? 'bg-slate-900 text-emerald-400' : 'text-slate-500'}`}>
                                    <i data-lucide="bar-chart-3" className="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        {/* Chapter List Overlay */}
                        {showChapters && (
                            <div className="absolute inset-0 z-50 bg-slate-950/95 backdrop-blur-2xl p-8 animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-xl font-bold text-white">Capítulos</h3>
                                    <button onClick={() => setShowChapters(false)} className="text-slate-400"><i data-lucide="x"></i></button>
                                </div>
                                <div className="space-y-3">
                                    {chapters.map((ch, idx) => (
                                        <button key={idx} onClick={() => changeChapter(idx)} className={`w-full text-left p-5 rounded-3xl transition-all flex items-center gap-4 ${currentChapter === idx ? 'bg-emerald-500 text-slate-950' : 'bg-slate-800/50 hover:bg-slate-800'}`}>
                                            <span className="text-xs font-black opacity-50">0{idx+1}</span>
                                            <span className="text-sm font-bold flex-1">{ch.title}</span>
                                            {currentChapter === idx && isPlaying && <div className="w-2 h-2 bg-slate-950 rounded-full animate-ping"></div>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Visual Experience */}
                        <div className="px-8 pb-8 flex flex-col items-center">
                            <div className="relative w-64 h-64 mb-10 group">
                                <div className={`absolute inset-0 bg-emerald-500 rounded-[3rem] blur-3xl opacity-20 transition-all duration-1000 ${isPlaying ? 'scale-125 opacity-30' : 'scale-100'}`}></div>
                                <div className="relative w-full h-full bg-slate-800 rounded-[3.5rem] p-1 border border-slate-700 shadow-2xl overflow-hidden">
                                    <div className="w-full h-full bg-slate-900 rounded-[3.2rem] flex flex-col items-center justify-center p-8">
                                        <div className={`mb-6 p-6 rounded-full bg-emerald-500/10 text-emerald-500 ${isPlaying ? 'animate-pulse' : ''}`}>
                                            <i data-lucide={readingMode === 'narrative' ? 'book-open' : 'bar-chart-3'} className="w-16 h-16"></i>
                                        </div>
                                        <h2 className="text-center text-lg font-black text-white leading-tight mb-2">{chapters[currentChapter].title}</h2>
                                        <p className="text-[10px] text-emerald-500/80 font-bold tracking-widest uppercase">Modo {readingMode === 'narrative' ? 'Contexto' : 'Estadística'}</p>
                                    </div>
                                    {loading && (
                                        <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center">
                                            <div className="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
                                            <p className="mt-4 text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Descargando Voz...</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Info Box */}
                            <div className="w-full p-5 bg-slate-800/50 rounded-[2rem] border border-slate-700/50 mb-8 overflow-y-auto max-h-32">
                                <div className="flex gap-4 items-start">
                                    <div className="mt-1"><i data-lucide="info" className="w-4 h-4 text-emerald-500"></i></div>
                                    <p className="text-[11px] text-slate-400 leading-relaxed italic">
                                        "{readingMode === 'narrative' ? chapters[currentChapter].narrative.substring(0, 200) : chapters[currentChapter].data}..."
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Player Controls */}
                        <div className="bg-slate-800/80 p-10 pt-6 rounded-t-[4rem] border-t border-slate-700/30">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex bg-slate-900 p-1 rounded-2xl border border-slate-700">
                                    {[1, 1.25, 1.5].map(s => (
                                        <button key={s} onClick={() => setPlaybackSpeed(s)} className={`px-4 py-1.5 rounded-xl text-[10px] font-black transition-all ${playbackSpeed === s ? 'bg-emerald-500 text-slate-950' : 'text-slate-500'}`}>{s}x</button>
                                    ))}
                                </div>
                                <div className="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
                                    <i data-lucide="clock" className="w-3 h-3"></i>
                                    <span>Sección Progresiva</span>
                                </div>
                            </div>

                            {/* Progress bar */}
                            <div className="mb-10 group cursor-pointer relative">
                                <div className="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden">
                                    <div className="h-full bg-emerald-500 transition-all duration-200 progress-glow" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>

                            <div className="flex items-center justify-between">
                                <button onClick={() => currentChapter > 0 && changeChapter(currentChapter - 1)} className="p-4 text-slate-400 hover:text-white transition-all active:scale-90" disabled={loading}>
                                    <i data-lucide="skip-back" className="w-8 h-8 fill-current"></i>
                                </button>
                                
                                <button onClick={togglePlay} disabled={loading} className="w-24 h-24 bg-emerald-500 hover:bg-emerald-400 text-slate-950 rounded-full flex items-center justify-center transition-all transform active:scale-90 shadow-2xl shadow-emerald-500/20 group">
                                    {loading ? <i data-lucide="loader-2" className="w-10 h-10 animate-spin"></i> : isPlaying ? <i data-lucide="pause" className="w-12 h-12 fill-current"></i> : <i data-lucide="play" className="w-12 h-12 fill-current ml-2"></i>}
                                </button>

                                <button onClick={() => currentChapter < chapters.length - 1 && changeChapter(currentChapter + 1)} className="p-4 text-slate-400 hover:text-white transition-all active:scale-90" disabled={loading}>
                                    <i data-lucide="skip-forward" className="w-8 h-8 fill-current"></i>
                                </button>
                            </div>
                        </div>

                        {error && (
                            <div className="absolute top-0 left-0 right-0 bg-red-600 p-3 text-[10px] font-bold text-center z-[100] animate-bounce">
                                <i data-lucide="alert-circle" className="w-3 h-3 inline mr-2"></i>{error}
                            </div>
                        )}
                        
                        <audio 
                            ref={audioRef} 
                            src={audioUrl} 
                            onTimeUpdate={() => audioRef.current && setProgress((audioRef.current.currentTime / audioRef.current.duration) * 100)}
                            onEnded={() => {
                                setIsPlaying(false);
                                if (currentChapter < chapters.length - 1) {
                                    setTimeout(() => changeChapter(currentChapter + 1), 3000);
                                }
                            }}
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
